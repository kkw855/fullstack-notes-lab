name: Scala API CI/CD Pipeline

on:
  push:
    branches:
      - 'main'
    paths:
      - 'custom-scala-api/**' # 💡 중요: 스칼라 프로젝트 폴더 내부가 변경될 때만 독립적으로 실행됨
  pull_request:
    branches:
      - 'main'
    paths:
      - 'custom-scala-api/**'

jobs:
  build-and-push:
    runs-on: arc-runner-set-lab
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # 최신 안정 버전인 v4 사용 권장
        with:
          fetch-depth: 0

      # 도커 빌드 전에 GHA 러너단에서 테스트 코드를 먼저 수행
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21' # 사용 중이신 Java 버전에 맞춰 변경 (17, 21 등)
          cache: 'sbt' # 💡 핵심: sbt 라이브러리와 컴파일 캐시를 유지해 속도를 끌어올립니다.

      - name: Run SBT Tests
        run: sbt test
        working-directory: ./custom-scala-api

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.CR_PAT }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 1️⃣ [기존 단계] 스칼라 API 애플리케이션 도커 이미지 빌드 및 푸시
      - name: Build and push Scala API Docker image
        uses: docker/build-push-action@v5
        with:
          # 💡 중요 1: 컨텍스트와 도커파일 위치를 스칼라 서브폴더로 정확히 지정합니다.
          context: ./custom-scala-api
          file: ./custom-scala-api/Dockerfile
          push: true
          # 💡 중요 2: github.repository를 그대로 쓰면 리액트 이미지와 이름이 충돌(오버라이트)되므로
          # 뒤에 명시적으로 /custom-scala-api 이름을 붙여 분리합니다.
          tags: |
            ghcr.io/${{ github.repository_owner }}/custom-scala-api:latest            
            ghcr.io/${{ github.repository_owner }}/custom-scala-api:${{ github.sha }}

      # 2️⃣ [추가 단계] Atlas 마이그레이션 도커 이미지 빌드 및 푸시
      - name: Build and push Atlas Migration Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./custom-scala-api
          file: ./custom-scala-api/Dockerfile.migration # 💡 마이그레이션용 도커파일 지정
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/atlas-migrations:latest            
            ghcr.io/${{ github.repository_owner }}/atlas-migrations:${{ github.sha }}

      # 3️⃣ [수정 단계] GitOps 레포지토리 업데이트 (deployment 및 migration-job 둘 다 패치)
      - name: Update GitOps repository
        shell: bash
        env:
          GIT_TOKEN: ${{ secrets.GITOPS_PAT }}
        run: |
          git config --global credential.helper store
          echo "https://${GIT_TOKEN}:x-oauth-basic@github.com" > ~/.git-credentials
          
          rm -rf gitops
          
          # 💡 본인의 스칼라 전용 GitOps 레포지토리 주소로 수정하세요 (예: scala-api-gitops)
          git clone https://github.com/kkw855/fullstack-notes-scala-gitops.git gitops
          cd gitops

          # OS 환경(Mac vs Linux)에 따른 sed 치환 처리
          if [[ "$OSTYPE" == "darwin"* ]]; then
            # 1. API 서버 이미지 태그 업데이트 (기존)
            sed -i '' "s|image: ghcr.io/${{ github.repository_owner }}/custom-scala-api:.*|image: ghcr.io/${{ github.repository_owner }}/custom-scala-api:${{ github.sha }}|g" deployment.yaml
            # 2. Atlas 마이그레이션 Job 이미지 태그 업데이트 (추가)
            sed -i '' "s|image: ghcr.io/${{ github.repository_owner }}/atlas-migrations:.*|image: ghcr.io/${{ github.repository_owner }}/atlas-migrations:${{ github.sha }}|g" migration-job.yaml
          else
            # 1. API 서버 이미지 태그 업데이트 (기존)
            sed -i "s|image: ghcr.io/${{ github.repository_owner }}/custom-scala-api:.*|image: ghcr.io/${{ github.repository_owner }}/custom-scala-api:${{ github.sha }}|g" deployment.yaml
            # 2. Atlas 마이그레이션 Job 이미지 태그 업데이트 (추가)
            sed -i "s|image: ghcr.io/${{ github.repository_owner }}/atlas-migrations:.*|image: ghcr.io/${{ github.repository_owner }}/atlas-migrations:${{ github.sha }}|g" migration-job.yaml
          fi
          
          # Git 커밋 및 푸시
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add deployment.yaml migration-job.yaml
          git commit -m "Update Scala API & Atlas Migration images to ${{ github.sha }}"
          git push -f https://${GIT_TOKEN}@github.com/kkw855/fullstack-notes-scala-gitops.git main
