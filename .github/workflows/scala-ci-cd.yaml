name: Scala API CI/CD Pipeline

on:
  push:
    branches:
      - 'main'
    paths:
      - 'custom-scala-api/**' # 💡 중요: 스칼라 프로젝트 폴더 내부가 변경될 때만 독립적으로 실행됨
  pull_request:
    branches:
      - 'main'
    paths:
      - 'custom-scala-api/**'

jobs:
  build-and-push:
    runs-on: arc-runner-set-lab
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # 최신 안정 버전인 v4 사용 권장
        with:
          fetch-depth: 0

      # 💡 [선택 사항] 만약 도커 빌드 전에 GHA 러너단에서 테스트 코드를 먼저 수행하고 싶다면 아래 주석을 해제하세요.
      # - name: Set up JDK 21
      #   uses: actions/setup-java@v4
      #   with:
      #     distribution: 'temurin'
      #     java-version: '21'
      #     cache: 'sbt' # sbt 의존성 캐싱 활성화
      # - name: Run SBT Tests
      #   run: sbt test
      #   working-directory: ./custom-scala-api

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.CR_PAT }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          # 💡 중요 1: 컨텍스트와 도커파일 위치를 스칼라 서브폴더로 정확히 지정합니다.
          context: ./custom-scala-api
          file: ./custom-scala-api/Dockerfile
          push: true
          # 💡 중요 2: github.repository를 그대로 쓰면 리액트 이미지와 이름이 충돌(오버라이트)되므로
          # 뒤에 명시적으로 /custom-scala-api 이름을 붙여 분리합니다.
          tags: |
            ghcr.io/${{ github.repository_owner }}/custom-scala-api:latest            
            ghcr.io/${{ github.repository_owner }}/custom-scala-api:${{ github.sha }}

      - name: Update GitOps repository
        shell: bash
        env:
          GIT_TOKEN: ${{ secrets.GITOPS_PAT }}
        run: |
          git config --global credential.helper store
          echo "https://${GIT_TOKEN}:x-oauth-basic@github.com" > ~/.git-credentials
          
          rm -rf gitops
          
          # 💡 본인의 스칼라 전용 GitOps 레포지토리 주소로 수정하세요 (예: scala-api-gitops)
          git clone https://github.com/kkw855/fullstack-notes-scala-gitops.git gitops
          cd gitops

          # 스칼라 이미지 주소 양식에 맞게 패치 수행
          if [[ "$OSTYPE" == "darwin"* ]]; then
            sed -i '' "s|image: ghcr.io/${{ github.repository_owner }}/custom-scala-api:.*|image: ghcr.io/${{ github.repository_owner }}/custom-scala-api:${{ github.sha }}|g" deployment.yaml
          else
            sed -i "s|image: ghcr.io/${{ github.repository_owner }}/custom-scala-api:.*|image: ghcr.io/${{ github.repository_owner }}/custom-scala-api:${{ github.sha }}|g" deployment.yaml
          fi
          
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add deployment.yaml
          git commit -m "Update Scala API image to ${{ github.sha }}"
          git push -f https://${GIT_TOKEN}@github.com/kkw855/fullstack-notes-scala-gitops.git main
